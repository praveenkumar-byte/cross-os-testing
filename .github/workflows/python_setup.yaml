name: python_setup

on:
  push:

jobs:
  python_setup:
    runs-on: ubuntu-latest
    steps:
      - name: python setup
        uses: actions/setup-python@v4
        with:
          python-version: 3.9
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest flake8
      - name: check version
        run: python --version
      - name: flake8 check
        run: flake8 --version
      - name: pytest check
        run: pytest --version